kind = "slides"
previewPath = "/flexilearn-deck/"
title = "FlexiLearn Presentation"
version = "1.0.0"
id = "artifacts/flexilearn-deck"
router = "path"

[[integratedSkills]]
name = "slides"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/flexilearn-deck/" ]
localPort = 23244

[services.development]
run = "pnpm --filter @workspace/flexilearn-deck run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flexilearn-deck", "run", "build" ]
publicDir = "artifacts/flexilearn-deck/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23244"
BASE_PATH = "/flexilearn-deck/"
